name: babyshop_products
description: Baby Products E-business Mobile Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Utilities
  provider: ^6.0.5
  cupertino_icons: ^1.0.6
  
  # Storage & Networking
  shared_preferences: ^2.2.2
  http: ^1.1.0
  
  # Notifications & Feedback
  fluttertoast: ^8.2.4
  
  # Badges & UI Components
  badges: ^3.1.2
  
  # Location Services (for delivery)
  geolocator: ^10.1.0
  
  # Image Picker (for product images)
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/